<section id="quiz">
  <div class="sec-header">
    <div class="prompt">// 概念小測驗</div>
    <h2>Quiz</h2>
    <div class="underline"></div>
  </div>

  <div class="quiz-container">
    <div id="quizSelect">
      <p style="font-size:0.85rem;color:var(--text-dim);margin-bottom:1.2rem;font-family:var(--mono)">選擇主題開始測驗：</p>
      <div class="quiz-select">
        <div class="quiz-topic-card" onclick="startQuiz('sort')">
          <div class="quiz-topic-icon">🔢</div>
          <div class="quiz-topic-name">排序演算法</div>
          <div class="quiz-topic-count">5 題</div>
        </div>
        <div class="quiz-topic-card" onclick="startQuiz('cpp')">
          <div class="quiz-topic-icon">⚙️</div>
          <div class="quiz-topic-name">C++ 基礎</div>
          <div class="quiz-topic-count">5 題</div>
        </div>
        <div class="quiz-topic-card" onclick="startQuiz('complexity')">
          <div class="quiz-topic-icon">📊</div>
          <div class="quiz-topic-name">時間複雜度</div>
          <div class="quiz-topic-count">5 題</div>
        </div>
      </div>
    </div>

    <div class="quiz-game" id="quizGame">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <span id="quizTopicLabel" style="font-family:var(--mono);font-size:0.78rem;color:var(--green)"></span>
        <button class="btn dim" style="font-size:0.72rem;padding:0.3rem 0.8rem" onclick="backToSelect()">← 返回</button>
      </div>
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="quizProgressFill" style="width:0%"></div>
      </div>
      <div id="quizCardArea"></div>
      <div class="quiz-result" id="quizResult">
        <div style="font-family:var(--mono);font-size:0.9rem;color:var(--text-dim)">// 測驗完成</div>
        <div class="result-score" id="resultScore"></div>
        <div class="result-msg" id="resultMsg"></div>
        <button class="btn" onclick="backToSelect()">再試一次</button>
      </div>
    </div>
  </div>
</section>
