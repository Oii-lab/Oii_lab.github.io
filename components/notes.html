<!-- ═══════════════════════════════════════════
     notes.html — 筆記區塊
     ═══════════════════════════════════════════ -->
<div class="sec-header">
    <div class="prompt">// 教學筆記 & 補充教材</div>
    <h2>Notes</h2>
    <div class="underline"></div>
  </div>

  <div class="notes-layout">
    <div class="notes-sidebar">
      <div class="notes-sidebar-head">// 目錄</div>
      <div class="note-nav-item active" onclick="showNote('bubble', this)">
        <span style="color:var(--amber)">▸</span> Bubble Sort
      </div>
      <div class="note-nav-item" onclick="showNote('quicksort', this)">
        <span style="color:var(--amber)">▸</span> Quick Sort
      </div>
      <div class="note-nav-item" onclick="showNote('bigo', this)">
        <span style="color:var(--cyan)">▸</span> 複雜度分析
      </div>
      <div class="note-nav-item" onclick="showNote('ptr', this)">
        <span style="color:#60a5fa">▸</span> 指標 & 記憶體
      </div>
      <div class="note-nav-item" onclick="showNote('stl', this)">
        <span style="color:#60a5fa">▸</span> C++ STL 速查
      </div>
    </div>

    <div class="note-content" id="noteContent">
      </div>
  </div>
